<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學生成績查詢系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f3f4f6;
            background-image: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
        }
        
        /* 隱藏原生捲軸但保持可捲動 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }

        .loader {
            border-top-color: #3b82f6;
            -webkit-animation: spinner 1.5s linear infinite;
            animation: spinner 1.5s linear infinite;
        }

        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 漸變進入動畫 */
        .fade-in {
            animation: fadeIn 0.5s ease-in-out forwards;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- 主容器 -->
    <div class="w-full max-w-2xl bg-white rounded-2xl shadow-xl overflow-hidden fade-in relative">
        
        <!-- 頂部裝飾條 -->
        <div class="h-2 bg-blue-500 w-full"></div>

        <div class="p-6 sm:p-10">
            <!-- 標題區 -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-blue-100 text-blue-500 mb-4">
                    <i class="fas fa-graduation-cap text-3xl"></i>
                </div>
                <h1 class="text-2xl sm:text-3xl font-bold text-gray-800">學生成績查詢系統</h1>
                <p class="text-gray-500 mt-2 text-sm sm:text-base">請輸入帳號密碼並選擇評量項目</p>
            </div>

            <!-- 查詢表單 -->
            <form id="queryForm" class="space-y-5">
                
                <!-- 帳號輸入 -->
                <div>
                    <label for="account" class="block text-sm font-medium text-gray-700 mb-1">學生帳號</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-user text-gray-400"></i>
                        </div>
                        <input type="text" id="account" name="account" required placeholder="請輸入學號" 
                            class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 sm:text-sm transition-colors">
                    </div>
                </div>

                <!-- 密碼輸入 -->
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">密碼</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-lock text-gray-400"></i>
                        </div>
                        <input type="password" id="password" name="password" required placeholder="請輸入密碼" 
                            class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 sm:text-sm transition-colors">
                    </div>
                </div>

                <!-- 評量選擇 (下拉式選單) -->
                <div>
                    <label for="assessment" class="block text-sm font-medium text-gray-700 mb-1">選擇評量項目</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-list text-gray-400"></i>
                        </div>
                        <select id="assessment" name="assessment" required disabled
                            class="block w-full pl-10 pr-10 py-3 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 sm:text-sm appearance-none bg-gray-50 text-gray-500 transition-colors">
                            <option value="">載入中...</option>
                        </select>
                        <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                            <i class="fas fa-chevron-down text-gray-400"></i>
                        </div>
                    </div>
                </div>

                <!-- 提交按鈕 -->
                <button type="submit" id="submitBtn" disabled
                    class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors disabled:bg-blue-300 disabled:cursor-not-allowed mt-6">
                    <span id="btnText">查詢成績</span>
                    <div id="btnSpinner" class="hidden ml-2 loader border-2 border-white rounded-full w-4 h-4"></div>
                </button>
            </form>

            <!-- 查詢結果區塊 (預設隱藏) -->
            <div id="resultArea" class="hidden mt-8 pt-6 border-t border-gray-200 fade-in">
                
                <!-- 學生資訊卡片 -->
                <div class="bg-blue-50 rounded-lg p-4 flex items-center mb-6">
                    <div class="bg-blue-100 p-3 rounded-full mr-4 text-blue-600">
                        <i class="fas fa-id-card text-xl"></i>
                    </div>
                    <div>
                        <p class="text-sm text-gray-500">學生資訊</p>
                        <p class="font-bold text-gray-800 text-lg">
                            <span id="resSeat" class="mr-2 border-r-2 border-gray-300 pr-2"></span>
                            <span id="resName"></span>
                        </p>
                    </div>
                </div>

                <!-- 成績表格 -->
                <h3 class="font-semibold text-gray-700 mb-3 flex items-center">
                    <i class="fas fa-chart-bar mr-2 text-blue-500"></i> 成績明細
                </h3>
                <div class="overflow-x-auto rounded-lg border border-gray-200 shadow-sm no-scrollbar">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr id="tableHead" class="text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                <!-- 表頭由 JS 動態產生 -->
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="bg-white divide-y divide-gray-200">
                            <!-- 資料列由 JS 動態產生 -->
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <!-- 自訂訊息對話框 (Toast) -->
    <div id="toast" class="fixed bottom-5 right-5 transform translate-y-20 opacity-0 transition-all duration-300 z-50 flex items-center p-4 mb-4 rounded-lg shadow-lg" role="alert">
        <div id="toastIcon" class="inline-flex flex-shrink-0 justify-center items-center w-8 h-8 rounded-lg">
            <i class="fas fa-info-circle"></i>
        </div>
        <div id="toastMessage" class="ml-3 text-sm font-normal">訊息</div>
        <button type="button" onclick="hideToast()" class="ml-auto -mx-1.5 -my-1.5 bg-transparent text-gray-400 hover:text-gray-900 rounded-lg focus:ring-2 focus:ring-gray-300 p-1.5 hover:bg-gray-100 inline-flex h-8 w-8" aria-label="Close">
            <i class="fas fa-times"></i>
        </button>
    </div>

    <script>
        // ==========================================
        // 設定區
        // ==========================================
        // 將這裡替換成您的 Google Apps Script 網頁應用程式 URL
        // 如果為空字串，系統將啟動「模擬模式」以供介面預覽
        const GAS_URL = ""; 

        // ==========================================
        // 變數與 DOM 元素
        // ==========================================
        const assessmentSelect = document.getElementById('assessment');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        const queryForm = document.getElementById('queryForm');
        const resultArea = document.getElementById('resultArea');
        const tableHead = document.getElementById('tableHead');
        const tableBody = document.getElementById('tableBody');
        
        let isMockMode = false;

        // ==========================================
        // 初始化與讀取下拉選單
        // ==========================================
        document.addEventListener('DOMContentLoaded', async () => {
            if (!GAS_URL) {
                isMockMode = true;
                showToast('尚未設定 GAS URL，目前處於模擬資料模式。', 'warning');
            }

            try {
                const sheets = await fetchSheets();
                populateSelect(sheets);
            } catch (error) {
                showToast('無法載入評量列表，請確認網路或 API 設定。', 'error');
                assessmentSelect.innerHTML = '<option value="">載入失敗</option>';
            }
        });

        // 獲取工作表名稱 (評量項目)
        async function fetchSheets() {
            if (isMockMode) {
                // 模擬延遲
                await new Promise(r => setTimeout(r, 1000));
                return ['第一學期第一次評量平時成績', '第一學期第二次評量平時成績', '第一學期期末評量平時成績'];
            }

            const response = await fetch(`${GAS_URL}?action=getSheets`);
            if (!response.ok) throw new Error('Network response was not ok');
            const data = await response.json();
            return data.sheets;
        }

        // 填充下拉式選單
        function populateSelect(sheets) {
            assessmentSelect.innerHTML = '<option value="" disabled selected>請選擇評量項目</option>';
            sheets.forEach(sheet => {
                const option = document.createElement('option');
                option.value = sheet;
                option.textContent = sheet;
                assessmentSelect.appendChild(option);
            });
            assessmentSelect.disabled = false;
            assessmentSelect.classList.remove('bg-gray-50', 'text-gray-500');
            submitBtn.disabled = false;
        }

        // ==========================================
        // 查詢成績邏輯
        // ==========================================
        queryForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const account = document.getElementById('account').value.trim();
            const password = document.getElementById('password').value.trim();
            const assessment = assessmentSelect.value;

            if (!account || !password || !assessment) {
                showToast('請填寫完整資訊並選擇評量', 'warning');
                return;
            }

            // UI 狀態切換為載入中
            setLoadingState(true);
            resultArea.classList.add('hidden');

            try {
                const result = await fetchGrades(account, password, assessment);
                
                if (result.success) {
                    renderGrades(result.data);
                    showToast('查詢成功！', 'success');
                } else {
                    showToast(result.message || '帳號或密碼錯誤，或是找不到該評量資料。', 'error');
                }
            } catch (error) {
                showToast('查詢時發生錯誤，請稍後再試。', 'error');
                console.error(error);
            } finally {
                setLoadingState(false);
            }
        });

        // 獲取學生成績
        async function fetchGrades(account, password, sheetName) {
            if (isMockMode) {
                await new Promise(r => setTimeout(r, 1200));
                
                // 模擬驗證失敗
                if (account !== '112001' || password !== '1234') {
                    return { success: false, message: '帳號或密碼錯誤 (測試帳號: 112001, 密碼: 1234)' };
                }

                // 模擬回傳資料
                return {
                    success: true,
                    data: {
                        seat: '01',
                        name: '王小明',
                        grades: {
                            '國文': 85,
                            '英文': 92,
                            '數學': 78,
                            '社會': 88,
                            '自然': 95,
                            '總分': 438,
                            '平均': 87.6
                        }
                    }
                };
            }

            // 實際打 API 邏輯 (使用 POST 傳遞 JSON 避免密碼暴露在 URL)
            const payload = {
                action: 'getGrades',
                account: account,
                password: password,
                sheetName: sheetName
            };

            const response = await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify(payload),
                // 使用 text/plain 避免 CORS preflight 問題 (GAS 常見技巧)
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }
            });
            
            if (!response.ok) throw new Error('API Request Failed');
            return await response.json();
        }

        // 渲染成績表
        function renderGrades(data) {
            // 填入基本資訊
            document.getElementById('resSeat').textContent = `座號：${data.seat}`;
            document.getElementById('resName').textContent = data.name;

            // 清空表格
            tableHead.innerHTML = '';
            tableBody.innerHTML = '';

            // 處理科目動態表頭
            const subjects = Object.keys(data.grades);
            
            subjects.forEach(subject => {
                const th = document.createElement('th');
                th.className = 'px-4 py-3 border-b border-gray-200 bg-gray-50';
                th.textContent = subject;
                tableHead.appendChild(th);
            });

            // 處理分數列
            const tr = document.createElement('tr');
            tr.className = 'hover:bg-gray-50 transition-colors';
            
            subjects.forEach(subject => {
                const score = data.grades[subject];
                const td = document.createElement('td');
                td.className = 'px-4 py-4 whitespace-nowrap text-sm text-gray-900 border-b border-gray-200';
                
                // 不及格分數標記紅色
                if (typeof score === 'number' && score < 60) {
                    td.innerHTML = `<span class="text-red-600 font-bold">${score}</span>`;
                } else {
                    td.textContent = score;
                }
                tr.appendChild(td);
            });

            tableBody.appendChild(tr);
            
            // 顯示區塊
            resultArea.classList.remove('hidden');
            // 滾動到結果區
            resultArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // ==========================================
        // UI 輔助功能
        // ==========================================
        function setLoadingState(isLoading) {
            if (isLoading) {
                btnText.textContent = '查詢中...';
                btnSpinner.classList.remove('hidden');
                submitBtn.disabled = true;
            } else {
                btnText.textContent = '查詢成績';
                btnSpinner.classList.add('hidden');
                submitBtn.disabled = false;
            }
        }

        // 顯示通知
        let toastTimeout;
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            const toastIcon = document.getElementById('toastIcon');
            
            toastMessage.textContent = message;
            
            // 重置樣式
            toast.className = 'fixed bottom-5 right-5 transform transition-all duration-300 z-50 flex items-center p-4 mb-4 rounded-lg shadow-lg';
            toastIcon.className = 'inline-flex flex-shrink-0 justify-center items-center w-8 h-8 rounded-lg';
            
            if (type === 'success') {
                toast.classList.add('text-green-800', 'bg-green-50');
                toastIcon.classList.add('bg-green-100', 'text-green-500');
                toastIcon.innerHTML = '<i class="fas fa-check"></i>';
            } else if (type === 'error') {
                toast.classList.add('text-red-800', 'bg-red-50');
                toastIcon.classList.add('bg-red-100', 'text-red-500');
                toastIcon.innerHTML = '<i class="fas fa-exclamation-triangle"></i>';
            } else if (type === 'warning') {
                toast.classList.add('text-yellow-800', 'bg-yellow-50');
                toastIcon.classList.add('bg-yellow-100', 'text-yellow-500');
                toastIcon.innerHTML = '<i class="fas fa-exclamation-circle"></i>';
            } else {
                toast.classList.add('text-blue-800', 'bg-blue-50');
                toastIcon.classList.add('bg-blue-100', 'text-blue-500');
                toastIcon.innerHTML = '<i class="fas fa-info"></i>';
            }

            // 顯示
            toast.classList.remove('translate-y-20', 'opacity-0');
            
            // 3秒後自動隱藏
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(hideToast, 3000);
        }

        function hideToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('translate-y-20', 'opacity-0');
        }
    </script>
</body>
</html>
